<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity 5: Simple Math Operations Widget</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Activity 5: Simple Math Operations Widget</h1>

<div class="math-widget">

    <div class="input-group">
        <label for="number1">First Number:</label>
        <input type="number" id="number1">
    </div>

    <div class="input-group">
        <label for="number2">Second Number:</label>
        <input type="number" id="number2">
    </div>

    <div class="operations">
        <button class="operation" data-operation="add">Add (+)</button>
        <button class="operation" data-operation="subtract">Subtract (-)</button>
        <button class="operation" data-operation="multiply">Multiply (×)</button>
        <button class="operation" data-operation="divide">Divide (÷)</button>
    </div>

    <div id="result" class="result">
        Result will appear here
    </div>

    <button id="clear">Clear All</button>

</div>

<script src="scripts.js"></script>

</body>
</html>
